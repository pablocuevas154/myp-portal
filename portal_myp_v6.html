<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<title>MyP — Portal del Propietario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --forest:#1a2e1a;--forest2:#243824;--forest3:#2e4a2e;
  --sand:#f5f0e8;--sand2:#ede7d9;--sand3:#e0d8c8;
  --gold:#c9a84c;--gold2:#e8c86e;
  --white:#ffffff;--ink:#1a1a1a;--ink2:#444;--ink3:#888;--ink4:#bbb;
  --green:#1a6b3c;--green-mid:#2d9e5f;--green-light:#e8f5ee;
  --red:#c0392b;--red-light:#fdf0f0;
  --amber:#7a5200;--amber-light:#fef8ed;
  --sidebar-w:240px;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:var(--sand)}

#login{position:fixed;inset:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.login-logo{font-family:'Playfair Display',serif;font-size:44px;color:var(--gold2);letter-spacing:1px;margin-bottom:6px}
.login-tagline{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:32px;width:310px}
.login-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}
.login-select{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;background:rgba(255,255,255,.08);color:#fff;appearance:none;cursor:pointer;margin-bottom:14px;outline:none}
.login-select option{background:var(--forest2);color:#fff}
.login-lang{display:flex;gap:8px;margin-bottom:20px}
.llb{flex:1;padding:8px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:none;color:rgba(255,255,255,.5);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.llb.active{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.3)}
.login-btn{width:100%;padding:13px;background:var(--gold);color:var(--forest);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.login-btn:hover{background:var(--gold2)}

#app{display:none;height:100vh;flex-direction:row}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--forest);display:flex;flex-direction:column;overflow:hidden;z-index:5}
.sb-header{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold2)}
.sb-prop{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px}
.sb-section{padding:14px 20px 5px;font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px}
.sb-scroll{overflow-y:auto;flex:1;padding-bottom:8px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.month-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;border:none;background:none;width:calc(100% - 16px);margin:0 8px;text-align:left;font-family:'Inter',sans-serif;transition:all .15s}
.month-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.month-item.active{background:rgba(201,168,76,.18);color:var(--gold2)}
.month-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.month-item.active .month-dot{background:var(--gold)}
.sb-div{height:1px;background:rgba(255,255,255,.08);margin:6px 0}
.sb-nav{padding:0 8px;border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff}
.nav-item i{font-size:16px;width:18px;flex-shrink:0}
.sb-bottom{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08)}
.lang-pill{display:flex;border:1px solid rgba(255,255,255,.12);border-radius:6px;overflow:hidden;margin-bottom:10px}
.lpb{flex:1;padding:5px 0;font-size:11px;font-weight:500;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;color:rgba(255,255,255,.4);transition:all .15s}
.lpb.active{background:rgba(255,255,255,.12);color:#fff}
.sb-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;transition:color .2s}
.sb-logout:hover{color:rgba(255,255,255,.7)}

.main{flex:1;height:100vh;overflow-y:auto;background:var(--sand)}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--sand3);border-radius:2px}
.view{display:none;padding:28px 24px;max-width:760px}
.view.active{display:block}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(26,46,26,.7);z-index:50;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.loading-spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold2);border-radius:50%;animation:spin .8s linear infinite}
.loading-txt{color:rgba(255,255,255,.7);font-size:14px;letter-spacing:.5px}
@keyframes spin{to{transform:rotate(360deg)}}

.hero-month{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ink3);margin-bottom:22px;font-weight:500}
.hero-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.hero-card{border-radius:18px;padding:24px 22px;position:relative;overflow:hidden}
.hc-forest{background:var(--forest)}
.hc-forest2{background:var(--forest2);border:1px solid var(--forest3)}
.hc-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.4);margin-bottom:12px;font-weight:500}
.hc-amount{font-family:'Playfair Display',serif;font-size:36px;color:var(--gold2);line-height:1;letter-spacing:-1px}
.hc-amount.neg{color:#e88}
.hc-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:7px}
.hc-icon{position:absolute;right:18px;top:18px;font-size:26px;color:rgba(255,255,255,.07)}
.hc-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:14px}
.hc-bar-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .6s}

.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.ks{background:var(--white);border-radius:12px;padding:13px 14px;border:1px solid var(--sand3)}
.ks-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:5px;font-weight:500}
.ks-val{font-size:19px;font-weight:600;color:var(--ink);line-height:1}
.ks-val.g{color:var(--green)}
.ks-val.r{color:var(--red)}
.ks-val.a{color:var(--amber)}
.ks-sub{font-size:10px;color:var(--ink4);margin-top:3px}

.dist-card{background:var(--white);border-radius:14px;padding:18px 20px;margin-bottom:16px;border:1px solid var(--sand3)}
.dist-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:12px;font-weight:500}
.dist-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.dist-row+.dist-row{border-top:1px solid var(--sand2)}
.dist-dot{width:7px;height:7px;border-radius:50%;margin-right:9px;flex-shrink:0}
.dist-name{font-size:13px;color:var(--ink2);display:flex;align-items:center}
.dist-val{font-size:14px;font-weight:600}

.sec-head{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:10px;margin-top:20px;font-weight:500}
.card-list{background:var(--white);border-radius:14px;overflow:hidden;border:1px solid var(--sand3);margin-bottom:16px}
.list-row{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 16px;gap:12px;transition:background .15s}
.list-row+.list-row{border-top:1px solid var(--sand2)}
.list-row:hover{background:var(--sand)}
.row-badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-block;margin-bottom:4px;letter-spacing:.3px}
.b-ing{background:var(--green-light);color:var(--green)}
.b-can{background:var(--amber-light);color:var(--amber)}
.b-dan{background:var(--red-light);color:var(--red)}
.row-name{font-size:14px;font-weight:500;color:var(--ink)}
.row-meta{font-size:12px;color:var(--ink3);margin-top:2px}
.row-costs{font-size:11px;color:var(--ink4);margin-top:3px}
.row-net{font-size:14px;font-weight:600;color:var(--green);white-space:nowrap;text-align:right}
.row-net.neg{color:var(--red)}
.row-bruto{font-size:11px;color:var(--ink4);text-align:right;margin-top:2px}
.gcat{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-block;margin-bottom:4px}
.gc-fijo{background:#eef2ff;color:#3730a3}
.gc-var{background:#fef9c3;color:#713f12}
.gc-fondo{background:var(--amber-light);color:var(--amber)}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kt{background:var(--white);border-radius:13px;padding:15px;border:1px solid var(--sand3)}
.kt-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:5px;font-weight:500}
.kt-val{font-size:21px;font-weight:600;color:var(--ink);line-height:1}
.kt-val.g{color:var(--green)}
.kt-val.r{color:var(--red)}
.kt-val.a{color:var(--amber)}
.kt-sub{font-size:10px;color:var(--ink4);margin-top:3px}

.hist-wrap{background:var(--white);border-radius:14px;padding:18px;border:1px solid var(--sand3);margin-bottom:16px}
.hist-bars{display:flex;align-items:flex-end;gap:8px;height:100px;margin-top:10px;padding:0 4px}
.hb-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.hb{width:100%;border-radius:5px 5px 0 0;background:var(--sand3);min-height:4px;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0}
.hb:hover{background:var(--sand2)}
.hb.active{background:rgba(26,46,26,.2);outline:2px solid var(--forest);outline-offset:1px}
.hb-tip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--forest);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;background:var(--white);border:1px solid var(--sand3);padding:1px 5px;border-radius:3px}
.hb:hover .hb-tip{opacity:1}
.hb-label{font-size:10px;color:var(--ink4);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

.im-wrap{overflow-x:auto;margin-bottom:16px;border-radius:14px;border:1px solid var(--sand3)}
.im-wrap::-webkit-scrollbar{height:4px}
.im-wrap::-webkit-scrollbar-thumb{background:var(--sand3);border-radius:2px}
.im-table{width:100%;border-collapse:collapse;background:var(--white);font-size:13px;min-width:520px}
.im-table th{padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--ink3);text-align:right;border-bottom:2px solid var(--sand2);white-space:nowrap;background:var(--white)}
.im-table th:first-child{text-align:left;position:sticky;left:0;background:var(--white);z-index:1}
.im-table td{padding:9px 14px;text-align:right;border-bottom:1px solid var(--sand2);color:var(--ink2);white-space:nowrap}
.im-table td:first-child{text-align:left;font-weight:500;color:var(--ink);position:sticky;left:0;background:var(--white);z-index:1;font-size:12px}
.im-table tr:last-child td{border-bottom:none}
.im-table tr:hover td{background:var(--sand)}
.im-table tr:hover td:first-child{background:var(--sand)}
.im-bold td{font-weight:700}
.im-green td:not(:first-child){color:var(--green);font-weight:700}
.im-separator td{border-top:2px solid var(--sand2)}
.col-act{background:rgba(26,46,26,.04) !important}

.empty{text-align:center;padding:36px 20px;color:var(--ink4);font-size:13px}
.pane{display:none}.pane.active{display:block}

.mobile-header{display:none;background:var(--forest);padding:13px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.mobile-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold2)}
.mob-menu-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;padding:4px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:4}
@media(max-width:640px){
  .sidebar{position:fixed;left:-260px;top:0;z-index:5;transition:left .25s;height:100vh}
  .sidebar.open{left:0}
  .sb-overlay.show{display:block}
  #app{flex-direction:column}
  .mobile-header{display:flex}
  .main{height:calc(100vh - 50px)}
  .hero-cards{grid-template-columns:1fr}
  .hc-amount{font-size:30px}
  .view{padding:18px 14px}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spin"></div>
  <div class="loading-txt" id="loading-txt">Cargando datos...</div>
</div>

<div id="login">
  <div class="login-logo">MyP</div>
  <div class="login-tagline" id="lt">Portal del propietario</div>
  <div class="login-box">
    <div class="login-lang">
      <button class="llb active" onclick="setLang('es',this)">Español</button>
      <button class="llb" onclick="setLang('pt',this)">Português</button>
    </div>
    <label class="login-label" id="ll">Tu propiedad</label>
    <select class="login-select" id="psel">
      <option value="">— elegir —</option>
      <option value="Casa Brisa">Casa Brisa</option>
      <option value="Casa Marina">Casa Marina</option>
      <option value="Casa Lagoa">Casa Lagoa</option>
      <option value="Casa Barcelona">Casa Barcelona</option>
      <option value="Casa dos coqueiros">Casa dos Coqueiros</option>
    </select>
    <button class="login-btn" id="lb" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="mobile-header">
    <div class="mobile-logo">MyP</div>
    <button class="mob-menu-btn" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
  </div>
  <div class="sb-overlay" id="overlay" onclick="closeSB()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">MyP</div>
      <div class="sb-prop" id="sb-prop"></div>
    </div>
    <div class="sb-scroll">
      <div class="sb-section" id="sb-periodo">Período</div>
      <div id="sb-months" style="padding:0 8px"></div>
      <div class="sb-nav">
        <button class="nav-item active" id="nav-resumen"       onclick="setView('resumen',this)"><i class="ti ti-home"></i><span id="nv-resumen">Resumen</span></button>
        <button class="nav-item"        id="nav-intermensual" onclick="setView('intermensual',this)"><i class="ti ti-columns"></i><span id="nv-intermensual">Intermensual</span></button>
        <button class="nav-item"        id="nav-reservas"     onclick="setView('reservas',this)"><i class="ti ti-calendar"></i><span id="nv-reservas">Reservas</span></button>
        <button class="nav-item"        id="nav-gastos"       onclick="setView('gastos',this)"><i class="ti ti-receipt"></i><span id="nv-gastos">Gastos</span></button>
        <button class="nav-item"        id="nav-kpis"         onclick="setView('kpis',this)"><i class="ti ti-chart-bar"></i><span id="nv-kpis">KPIs</span></button>
        <button class="nav-item"        id="nav-historial"    onclick="setView('historial',this)"><i class="ti ti-history"></i><span id="nv-historial">Historial</span></button>
      </div>
    </div>
    <div class="sb-bottom">
      <div class="lang-pill">
        <button class="lpb active" onclick="setLang('es',this)">ES</button>
        <button class="lpb" onclick="setLang('pt',this)">PT</button>
      </div>
      <button class="sb-logout" onclick="doLogout()"><i class="ti ti-logout" style="font-size:15px"></i><span id="sb-salir">Salir</span></button>
    </div>
  </div>

  <div class="main">
    <div class="view active" id="view-resumen">
      <div class="hero-month" id="hero-month"></div>
      <div class="hero-cards" id="hero-cards"></div>
      <div class="dist-card"  id="dist-card"></div>
      <div class="kpi-strip"  id="kpi-strip"></div>
    </div>
    <div class="view" id="view-intermensual">
      <div class="sec-head" id="sh-im">Comparativa intermensual</div>
      <div class="im-wrap"><table class="im-table" id="im-table"></table></div>
    </div>
    <div class="view" id="view-reservas">
      <div class="sec-head" id="sh-reservas">Reservas del mes</div>
      <div class="card-list" id="reservas-list"></div>
    </div>
    <div class="view" id="view-gastos">
      <div class="kpi-strip" id="gastos-kpis"></div>
      <div class="sec-head"  id="sh-gastos">Detalle de gastos</div>
      <div class="card-list" id="gastos-list"></div>
    </div>
    <div class="view" id="view-kpis">
      <div class="kpi-grid" id="kpi-grid"></div>
    </div>
    <div class="view" id="view-historial">
      <div class="hist-wrap">
        <div class="sec-head" style="margin-top:0" id="sh-hchart">Ingreso neto mensual</div>
        <div class="hist-bars" id="hist-bars"></div>
      </div>
      <div class="kpi-strip" id="hist-totals"></div>
      <div class="sec-head"  id="sh-hdetail">Detalle por mes</div>
      <div class="card-list" id="hist-table"></div>
    </div>
  </div>
</div>

<script>
// ── API ────────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbzHXhpgnMRwRhUH6mdrvanoq93blyxswmFJl9n_MBvosN2SXPMVl_hmCz1mS79E8CPC/exec";

// ── TRADUCCIONES ───────────────────────────────────────────
const T = {
  es:{
    portal:'Portal del propietario',tuProp:'Tu propiedad',entrar:'Entrar',salir:'Salir',
    periodo:'Período',resumen:'Resumen',intermensual:'Intermensual',reservas:'Reservas',
    gastos:'Gastos',kpis:'KPIs',historial:'Historial',
    ingGenerado:'Ingreso generado',fondoSaldo:'Fondo de previsión',
    ingBruto:'Ingreso bruto',ingNeto:'Ingreso neto',reservasCnt:'Reservas',
    diasOcup:'Días ocupados',ocup:'Ocupación',distribIng:'Distribución del período',
    propietario:'Propietario',empresa:'Empresa',fondo:'Fondo',
    fondoCap:'Techo R$10.000',resDelMes:'Reservas',detGastos:'Detalle de gastos',
    gastosFijos:'Gastos fijos',gastosVar:'Gastos variables',gastosTotal:'Total gastos',
    ticketProm:'Ticket neto',ingPorNoche:'Por noche',noches:'noches',huespedes:'huéspedes',
    catFijo:'Fijo',catVar:'Variable',catFondo:'Fondo',
    tipoIng:'Ingreso',tipoCan:'Cancelación',tipoDan:'Daños',
    limpieza:'Limpieza',productos:'Prod.',
    sinDatos:'Sin movimientos este período',acumAnio:'Acumulado 2026',
    tuPagoAcum:'Tu pago acumulado',ingBrutoProm:'Bruto prom.',margen:'Margen neto',
    histChart:'Ingreso neto mensual',histDetail:'Detalle por mes',
    transferido:'ya transferido',pendiente:'estimado',
    imTitle:'Comparativa intermensual',
    imOcup:'Ocupación',imBruto:'Ing. brutos',imLimp:'Limpieza',imProd:'Productos',
    imNeto:'Ing. netos',imFondoAp:'Aporte fondo',imFondoSaldo:'Saldo fondo',imProp:'Transf. propietario',
    cargando:'Cargando datos...',actual:'actual',
    months:{'2026-01':'Ene 2026','2026-02':'Feb 2026','2026-03':'Mar 2026','2026-04':'Abr 2026','2026-05':'May 2026','2026-06':'Jun 2026'},
    monthsFull:{'2026-01':'Enero 2026','2026-02':'Febrero 2026','2026-03':'Marzo 2026','2026-04':'Abril 2026','2026-05':'Mayo 2026','2026-06':'Junio 2026'},
  },
  pt:{
    portal:'Portal do proprietário',tuProp:'Sua propriedade',entrar:'Entrar',salir:'Sair',

// Todas las claves de mes posibles
const MK = ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06'];

let lang = 'es', curProp = '', curMonth = '', curView = 'resumen';
let PROP_DATA = null; // datos cargados de la API

// ── HELPERS ────────────────────────────────────────────────
function R(n){ return 'R$ '+parseFloat(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function t(k){ return T[lang][k]||k; }
function tm(k){ return T[lang].months[k]||k; }
function tmf(k){ return T[lang].monthsFull[k]||tm(k); }

function getCurrentMonth(){
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function netoDeReserva(r){
  if(r.tipo==='INGRESO'||r.tipo==='INGRESO CANCELACION'||r.tipo==='INGRESO DAÑOS')
    return r.bruto - (r.limpieza||0) - (r.productos||0);
  return 0;
}

// ── API ────────────────────────────────────────────────────
function showLoader(msg){ 
  document.getElementById('loading-txt').textContent = msg || t('cargando');
  document.getElementById('loading-overlay').classList.add('show'); 
}
function hideLoader(){ document.getElementById('loading-overlay').classList.remove('show'); }

async function cargarDatos(prop) {
  showLoader(t('cargando'));
  try {
    const url = API_URL + '?propiedad=' + encodeURIComponent(prop);
    const res = await fetch(url);
    const raw = await res.json();
    PROP_DATA = procesarDatos(raw, prop);
    hideLoader();
    render();
  } catch(err) {
    hideLoader();
    console.error('Error API:', err);
    // Mostrar error en pantalla
    document.getElementById('hero-cards').innerHTML = 
      '<div style="color:red;padding:20px">Error cargando datos. Verificá la conexión.</div>';
  }
}

function procesarDatos(raw, prop) {
  // Estructura: { months: { '2026-01': { reservas, gastos, trProp, trFondo, fondoAporte, fondoSaldoAcum } } }
  const months = {};

  // Inicializar todos los meses
  for(const mk of MK){
    months[mk] = { reservas:[], gastos:[], trProp:0, trEmp:0, trFondo:0, fondoAporte:0, fondoEgreso:0 };
  }

  // Procesar reservas
  for(const r of raw.reservas){
    if(!r.mes || !months[r.mes]) continue;
    months[r.mes].reservas.push(r);
  }

  // Procesar gastos
  for(const g of raw.gastos){
    if(!g.mes || !months[g.mes]) continue;
    months[g.mes].gastos.push(g);
    if(g.cat === 'fondo') months[g.mes].fondoEgreso += g.monto;
  }

  // Procesar transferencias
  for(const tr of raw.transferencias){
    if(!tr.mes || !months[tr.mes]) continue;
    if(tr.tipo === 'TRANSFERENCIA A PROPIETARIO') months[tr.mes].trProp  += tr.monto;
    if(tr.tipo === 'TRANSFERENCIA A EMPRESA')     months[tr.mes].trEmp   += tr.monto;
    if(tr.tipo === 'TRANSFERENCIA A FONDO')       {
      months[tr.mes].trFondo    += tr.monto;
      months[tr.mes].fondoAporte = tr.monto; // aporte de ESE mes
    }
  }

  // Calcular saldo acumulado del fondo mes a mes
  let saldoAcum = 0;
  for(const mk of MK){
    saldoAcum += months[mk].fondoAporte - months[mk].fondoEgreso;
    months[mk].fondoSaldoAcum = saldoAcum;
  }

  // Fondo acumulado total (del objeto fondo de la API)
  const fondoTotal = raw.fondo[prop] || {aportes:0, egresos:0, saldo:0};

  return { months, fondoTotal };
}

function getM(){
  if(!PROP_DATA) return null;
  if(curMonth === 'ACUMULADO' || curMonth === 'ANUAL'){
    // Agregar todos los meses
    const keys = MK;
    const agg = { reservas:[], gastos:[], trProp:0, trEmp:0, trFondo:0, fondoAporte:0, fondoEgreso:0, fondoSaldoAcum:0 };
    for(const k of keys){
      const m = PROP_DATA.months[k];
      if(!m) continue;
      agg.reservas.push(...m.reservas);
      agg.gastos.push(...m.gastos);
      agg.trProp    += m.trProp;
      agg.trEmp     += m.trEmp;
      agg.trFondo   += m.trFondo;
      agg.fondoAporte += m.fondoAporte;
      agg.fondoEgreso += m.fondoEgreso;
    }
    agg.fondoSaldoAcum = PROP_DATA.fondoTotal.saldo;
    return agg;
  }
  return PROP_DATA.months[curMonth] || { reservas:[], gastos:[], trProp:0, trEmp:0, trFondo:0, fondoAporte:0, fondoEgreso:0, fondoSaldoAcum:0 };
}

// ── LOGIN / LOGOUT ──────────────────────────────────────────
function doLogin(){
  const v = document.getElementById('psel').value;
  if(!v) return;
  curProp   = v;
  curMonth  = getCurrentMonth();
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
  document.getElementById('sb-prop').textContent = v;
  buildSB();
  cargarDatos(v);
}

function doLogout(){
  PROP_DATA = null;
  document.getElementById('app').style.display   = 'none';
  document.getElementById('login').style.display = 'flex';
}

function toggleSB(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSB(){  document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

// ── SIDEBAR ─────────────────────────────────────────────────
function buildSB(){
  document.getElementById('sb-periodo').textContent = t('periodo');
  document.getElementById('sb-salir').textContent   = t('salir');
  ['resumen','intermensual','reservas','gastos','kpis','historial'].forEach(v => {
    const el = document.getElementById('nv-'+v);
    if(el) el.textContent = t(v);
  });

  const curKey = getCurrentMonth();
  const div    = '<div class="sb-div"></div>';

  // Botón mes actual
  const curBtn = `<button class="month-item${curKey===curMonth?' active':''}" onclick="curMonth='${curKey}';buildSB();if(PROP_DATA)render();closeSB()">
    <span class="month-dot"></span>${tmf(curKey)} <span style="font-size:10px;opacity:.5;margin-left:4px">${t('actual')}</span>
  </button>`;

  // Acumulado / Anual
  const specials = [
    {k:'ACUMULADO', es:'Acumulado', pt:'Acumulado'},
    {k:'ANUAL',     es:'Anual 2026', pt:'Anual 2026'},
  ];
  const specBtns = specials.map(s => `<button class="month-item${s.k===curMonth?' active':''}" onclick="curMonth='${s.k}';buildSB();if(PROP_DATA)render();closeSB()">
    <span class="month-dot"></span>${lang==='es'?s.es:s.pt}
  </button>`).join('');

  // Meses pasados (inverso, excluyendo el actual)
  const pastBtns = [...MK].reverse().filter(k=>k!==curKey).map(k => `<button class="month-item${k===curMonth?' active':''}" onclick="curMonth='${k}';buildSB();if(PROP_DATA)render();closeSB()">
    <span class="month-dot"></span>${tmf(k)}
  </button>`).join('');

  document.getElementById('sb-months').innerHTML = curBtn + div + specBtns + div + pastBtns;
}

function setView(v, btn){
  curView = v;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else { const b=document.getElementById('nav-'+v); if(b) b.classList.add('active'); }
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  closeSB();
}

  const totalBruto = ingresos.reduce((a,r) => a+r.bruto, 0);
  const dias  = m.reservas.filter(r=>r.tipo==='INGRESO').reduce((a,r)=>a+r.dias,0);

// ── INTERMENSUAL ─────────────────────────────────────────────
function renderIntermensual(){
  document.getElementById('sh-im').textContent = t('imTitle');

  if(curMonth==='ACUMULADO'||curMonth==='ANUAL'){
    document.getElementById('im-table').innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--ink4);font-size:13px">Seleccioná un mes específico para ver la comparativa intermensual</td></tr>`;
    return;
  }

  // Mostrar todos los meses con datos
  const activeMK = MK.filter(k => {
    const m = PROP_DATA.months[k];
    return m && m.reservas.filter(r=>r.tipo==='INGRESO').length > 0;
  });

  if(!activeMK.length){
    document.getElementById('im-table').innerHTML = `<tr><td style="text-align:center;padding:30px;color:var(--ink4)">${t('sinDatos')}</td></tr>`;
    return;
  }

  // Calcular datos por mes incluyendo saldo fondo acumulado
  const mData = {};
  for(const k of activeMK){
    const m = PROP_DATA.months[k];
    const ing = m.reservas.filter(r=>r.tipo==='INGRESO'||r.tipo==='INGRESO CANCELACION'||r.tipo==='INGRESO DAÑOS');
    const netoT = ing.reduce((a,r)=>a+netoDeReserva(r),0);
    const brutoT = ing.reduce((a,r)=>a+r.bruto,0);
    const dias = m.reservas.filter(r=>r.tipo==='INGRESO').reduce((a,r)=>a+r.dias,0);
    const limp = ing.reduce((a,r)=>a+(r.limpieza||0),0);
    const prod = ing.reduce((a,r)=>a+(r.productos||0),0);
    const prop = m.trProp > 0 ? m.trProp : netoT*0.5;
    mData[k] = {
      dias, bruto:brutoT, limp, prod, neto:netoT,
      fondoAp: m.fondoAporte,
      fondoSaldo: m.fondoSaldoAcum,  // saldo ACUMULADO hasta ese mes
      prop
    };
  }

  const rows = [
    {key:'ocup',       label:t('imOcup'),       fmt:d=>Math.round((d.dias/31)*100)+'%', cls:''},
    {key:'bruto',      label:t('imBruto'),       fmt:d=>R(d.bruto),                      cls:''},
    {key:'limp',       label:t('imLimp'),        fmt:d=>R(d.limp),                       cls:'red'},
    {key:'prod',       label:t('imProd'),        fmt:d=>R(d.prod),                       cls:'red', sep:true},
    {key:'neto',       label:t('imNeto'),        fmt:d=>R(d.neto),                       cls:'bold'},
    {key:'fondoAp',    label:t('imFondoAp'),     fmt:d=>R(d.fondoAp),                    cls:''},
    {key:'fondoSaldo', label:t('imFondoSaldo'),  fmt:d=>R(d.fondoSaldo),                 cls:'green'},
    {key:'prop',       label:t('imProp'),        fmt:d=>R(d.prop),                       cls:'green', sep:true},
  ];

  let html = `<thead><tr><th></th>${activeMK.map(k=>`<th${k===curMonth?' class="col-act"':''}>${tm(k)}</th>`).join('')}</tr></thead><tbody>`;

  for(const row of rows){
    const trCls = [row.sep?'im-separator':'', row.cls==='green'?'im-green':'', row.cls==='bold'?'im-bold':''].filter(Boolean).join(' ');
    html += `<tr class="${trCls}"><td>${row.label}</td>`;
    for(const k of activeMK){
      const d = mData[k];
      const isEmpty = d.bruto===0&&d.neto===0&&d.dias===0;
      const val = isEmpty&&row.key!=='fondoSaldo' ? '<span style="color:var(--ink4)">—</span>' : row.fmt(d);
      let style = '';
      if(row.cls==='red'&&!isEmpty) style='color:var(--red)';
      html += `<td${k===curMonth?' class="col-act"':''} style="${style}">${val}</td>`;
    }
    html += `</tr>`;
  }
  html += '</tbody>';
  document.getElementById('im-table').innerHTML = html;
}

  const dias=ing.reduce((a,r)=>a+r.dias,0), n=ing.length, h=ing.reduce((a,r)=>a+r.huespedes,0);
  const ocup=Math.round((dias/31)*100), margen=bruto>0?Math.round((netoT/bruto)*100):0;
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kt"><div class="kt-label">${t('ingBruto')}</div><div class="kt-val">${R(bruto)}</div></div>
    <div class="kt"><div class="kt-label">${t('ingNeto')}</div><div class="kt-val g">${R(netoT)}</div></div>
    <div class="kt"><div class="kt-label">Propietario 50%</div><div class="kt-val g">${R(netoT*.5)}</div></div>
    <div class="kt"><div class="kt-label">Empresa 30%</div><div class="kt-val">${R(netoT*.3)}</div></div>
    <div class="kt"><div class="kt-label">Fondo 20%</div><div class="kt-val a">${R(netoT*.2)}</div></div>
    <div class="kt"><div class="kt-label">${t('reservasCnt')}</div><div class="kt-val">${n}</div></div>
    <div class="kt"><div class="kt-label">${t('diasOcup')}</div><div class="kt-val">${dias}<div class="kt-sub">${t('noches')}</div></div></div>
    <div class="kt"><div class="kt-label">${t('ocup')}</div><div class="kt-val ${ocup>=60?'g':ocup<30?'r':''}">${ocup}%</div></div>
    <div class="kt"><div class="kt-label">${t('ticketProm')}</div><div class="kt-val">${R(n>0?netoT/n:0)}</div></div>
    <div class="kt"><div class="kt-label">${t('ingPorNoche')}</div><div class="kt-val">${R(dias>0?netoT/dias:0)}</div></div>
    <div class="kt"><div class="kt-label">${t('margen')}</div><div class="kt-val ${margen>=70?'g':margen<50?'r':''}">${margen}%</div></div>
    <div class="kt"><div class="kt-label">Huéspedes</div><div class="kt-val">${h}</div></div>
    <div class="kt"><div class="kt-label">Ing/huésped</div><div class="kt-val">${R(h>0?netoT/h:0)}</div></div>
    <div class="kt"><div class="kt-label">${t('ingBrutoProm')}</div><div class="kt-val">${R(n>0?bruto/n:0)}</div></div>
  `;
}

// ── HISTORIAL ─────────────────────────────────────────────────
function renderHistorial(){
  if(!PROP_DATA) return;
  const mData = MK.map(k=>{
    const m = PROP_DATA.months[k];
    const ing = m.reservas.filter(r=>r.tipo==='INGRESO'||r.tipo==='INGRESO CANCELACION'||r.tipo==='INGRESO DAÑOS');
    const n = ing.reduce((a,r)=>a+netoDeReserva(r),0);
    const nRes = m.reservas.filter(r=>r.tipo==='INGRESO').length;
    const dias = m.reservas.filter(r=>r.tipo==='INGRESO').reduce((a,r)=>a+r.dias,0);
    const prop = m.trProp>0 ? m.trProp : n*0.5;
    return {k,n,nRes,dias,prop};
  });

  const maxN = Math.max(...mData.map(m=>m.n),1);
  document.getElementById('sh-hchart').textContent = t('histChart');
  document.getElementById('hist-bars').innerHTML = mData.map(m=>{
    const hpx = Math.max(Math.round((m.n/maxN)*100),4);
    const valStr = m.n>0 ? 'R$'+Math.round(m.n).toLocaleString('pt-BR') : '—';
    return `<div class="hb-col">
      <div class="hb${m.k===curMonth?' active':''}" style="height:${hpx}px" onclick="curMonth='${m.k}';buildSB();render();setView('resumen',document.getElementById('nav-resumen'))">
        <span class="hb-tip">${valStr}</span>
      </div>
      <div class="hb-label">${tm(m.k)}</div>
    </div>`;
  }).join('');

  const aN=mData.reduce((a,m)=>a+m.n,0), aP=mData.reduce((a,m)=>a+m.prop,0);
  const aD=mData.reduce((a,m)=>a+m.dias,0), aR=mData.reduce((a,m)=>a+m.nRes,0);
  document.getElementById('hist-totals').innerHTML = `
    <div class="ks"><div class="ks-label">${t('acumAnio')} neto</div><div class="ks-val g">${R(aN)}</div></div>
    <div class="ks"><div class="ks-label">${t('tuPagoAcum')}</div><div class="ks-val g">${R(aP)}</div></div>
    <div class="ks"><div class="ks-label">Total noches</div><div class="ks-val">${aD}</div></div>
    <div class="ks"><div class="ks-label">Total reservas</div><div class="ks-val">${aR}</div></div>
  `;

  document.getElementById('sh-hdetail').textContent = t('histDetail');
  document.getElementById('hist-table').innerHTML = mData.filter(m=>m.nRes>0).map(m=>`
    <div class="list-row" style="cursor:pointer" onclick="curMonth='${m.k}';buildSB();render();setView('resumen',document.getElementById('nav-resumen'))">
      <div style="flex:1">
        <div class="row-name">${tmf(m.k)}</div>
        <div class="row-meta">${m.nRes} reservas · ${m.dias} noches · neto ${R(m.n)}</div>
      </div>
      <div>
        <div class="row-net">${R(m.prop)}</div>
        <div class="row-bruto">propietario</div>
      </div>
    </div>
  `).join('') || `<div class="empty">${t('sinDatos')}</div>`;
}

buildSB();
</script>
